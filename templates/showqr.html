<!DOCTYPE html>
<html>
<head>
    <title>Google Authenticator Setup</title>
</head>
<body>
    <h2>Setup Google Authenticator</h2>

    <p>Scan this QR code in Google Authenticator:</p>

    <img src="/{{ qr_image }}" alt="QR Code">

    <p><strong>OR enter secret manually:</strong></p>
    <p>{{ secret }}</p>

    <br>
    <a href="{{ url_for('login') }}">Go to Login</a>
</body>
</html>
